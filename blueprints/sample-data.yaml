version: 1
metadata:
  name: room-presence-tracker sample data (dev only)
  labels:
    blueprints.goauthentik.io/instantiate: "true"
context:
  app_slug: room-presence-tracker
  client_id: !Env [DEV_AUTHENTIK_CLIENT_ID, "dev-client-id-room-presence"]
  client_secret: !Env [DEV_AUTHENTIK_CLIENT_SECRET, "dev-client-secret-room-presence-CHANGE-ME"]
  api_token: !Env [DEV_AUTHENTIK_API_TOKEN, "dev-api-token-room-presence-CHANGE-ME"]
  sample_password: !Env [DEV_SAMPLE_PASSWORD, "password1234"]
entries:
  - model: authentik_core.group
    state: created
    identifiers:
      name: kiosk
    id: kiosk-group

  - model: authentik_core.user
    state: created
    identifiers:
      username: yamada
    id: user-yamada
    attrs:
      name: "山田 太郎"
      email: yamada@example.com
      password: !Context sample_password
      attributes:
        student_id: "24001"
        discord:
          id: "100000000000000001"
          username: yamada_taro
          global_name: "Yamada Taro"
          avatar_url: ""

  - model: authentik_core.user
    state: created
    identifiers:
      username: suzuki
    id: user-suzuki
    attrs:
      name: "鈴木 花子"
      email: suzuki@example.com
      password: !Context sample_password
      attributes:
        student_id: "24002"
        discord:
          id: "100000000000000002"
          username: suzuki_hanako
          global_name: "Suzuki Hanako"
          avatar_url: ""

  - model: authentik_core.user
    state: created
    identifiers:
      username: kiosk-001
    id: user-kiosk
    attrs:
      name: "Kiosk 端末1"
      email: kiosk-001@example.com
      password: !Context sample_password
      groups:
        - !KeyOf kiosk-group
      attributes:
        student_id: null
        discord: null

  # --- カスタム OIDC スコープ (src/lib/auth.ts が要求する claim と一致させる) ---
  - model: authentik_providers_oauth2.scopemapping
    state: created
    identifiers:
      managed: dev.room-presence-tracker/scope-student-id
    id: scope-student-id
    attrs:
      name: "room-presence: student_id"
      scope_name: student_id
      description: "Student ID custom claim"
      expression: |
        return {"student_id": request.user.attributes.get("student_id")}

  - model: authentik_providers_oauth2.scopemapping
    state: created
    identifiers:
      managed: dev.room-presence-tracker/scope-discord
    id: scope-discord
    attrs:
      name: "room-presence: discord"
      scope_name: discord
      description: "Discord linkage custom claim"
      expression: |
        return {"discord": request.user.attributes.get("discord")}

  - model: authentik_providers_oauth2.scopemapping
    state: created
    identifiers:
      managed: dev.room-presence-tracker/scope-groups
    id: scope-groups
    attrs:
      name: "room-presence: groups"
      scope_name: groups
      description: "Group membership custom claim"
      expression: |
        return {"groups": [group.name for group in request.user.groups.all()]}

  # --- OAuth2/OIDC Provider + Application ---
  - model: authentik_providers_oauth2.oauth2provider
    state: created
    identifiers:
      name: room-presence-tracker
    id: provider
    attrs:
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      client_id: !Context client_id
      client_secret: !Context client_secret
      redirect_uris:
        - matching_mode: strict
          url: http://localhost:3000/api/auth/callback/authentik
          redirect_uri_type: authorization
      grant_types:
        - authorization_code
        - refresh_token
      signing_key: !Find [authentik_crypto.certificatekeypair, [name, "authentik Self-signed Certificate"]]
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-openid]]
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-email]]
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-profile]]
        - !KeyOf scope-student-id
        - !KeyOf scope-discord
        - !KeyOf scope-groups

  - model: authentik_core.application
    state: created
    identifiers:
      slug: !Context app_slug
    attrs:
      name: "Room Presence Tracker (dev)"
      provider: !KeyOf provider

  # --- src/lib/authentik.ts (AUTHENTIK_API_TOKEN) 用 API トークン。 akadmin に紐付け ---
  - model: authentik_core.token
    state: created
    identifiers:
      identifier: room-presence-dev-api-token
      intent: api
      user: !Find [authentik_core.user, [username, akadmin]]
    attrs:
      key: !Context api_token
      expiring: false
