apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "room-presence.fullname" . }}-midnight-reset
  labels:
    {{- include "room-presence.labels" . | nindent 4 }}
spec:
  # 深夜0時 JST = UTC 15:00
  schedule: "0 15 * * *"
  timeZone: "Asia/Tokyo"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: reset
              image: curlimages/curl:8.5.0
              command:
                - sh
                - -c
                - |
                  curl -sf -X POST \
                    -H "Authorization: Bearer ${RESET_SECRET}" \
                    "${APP_URL}/api/presence/reset"
              env:
                - name: APP_URL
                  value: "http://{{ include "room-presence.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.service.port }}"
                - name: RESET_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.app.secretName }}
                      key: RESET_SECRET
